{% extends "base.html" %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-5">
    <div class="glass-card p-4">
      <h4 class="fw-bold">Register Student</h4>
      <p class="text-light opacity-75 mb-3">Capture {{count}} good face samples (one face only).</p>

      <div class="mb-2">
        <label class="form-label">Name</label>
        <input id="name" class="form-control" placeholder="Enter name">
      </div>

      <div class="mb-3">
        <label class="form-label">Registration No</label>
        <input id="reg_no" class="form-control" placeholder="Enter reg no">
      </div>

      <div class="d-flex gap-2">
        <button id="start" class="btn btn-primary">Start Camera</button>
        <button id="capture" class="btn btn-success" disabled>Capture</button>
      </div>

      <div class="mt-3">
        <span class="badge badge-soft p-2">Saved: <b id="saved">0</b> / {{count}}</span>
        <div class="mt-2" id="msg"></div>
      </div>
    </div>
  </div>

  <div class="col-lg-7">
    <div class="glass-card p-3">
      <video id="video" autoplay playsinline width="100%"></video>
      <canvas id="canvas" class="d-none"></canvas>
    </div>
  </div>
</div>

<script>
const TOTAL = {{count}};
</script>
<script src="{{ url_for('static', filename='register.js') }}"></script>
{% endblock %}
