{% extends "base.html" %}
{% block content %}

<div class="row g-4">

  <div class="col-md-4">
    <div class="glass-card p-4 text-center">
      <h5>Total Students</h5>
      <h2 class="fw-bold">{{total_students}}</h2>
    </div>
  </div>

  <div class="col-md-4">
    <div class="glass-card p-4 text-center">
      <h5>Today's Date</h5>
      <h6>{{today}}</h6>
    </div>
  </div>

  <div class="col-md-4">
    <div class="glass-card p-4 text-center">
      <h5>Present Today</h5>
      <h2 class="fw-bold">{{today_present}}</h2>
    </div>
  </div>

</div>

<div class="mt-5 glass-card p-4">
  <h4 class="fw-bold">Quick Actions</h4>
  <div class="mt-3 d-flex gap-3">
    <a href="{{ url_for('register_page') }}" class="btn btn-primary">Register Student</a>
    <a href="{{ url_for('attendance_page') }}" class="btn btn-success">Start Attendance</a>
  </div>
</div>

{% endblock %}
