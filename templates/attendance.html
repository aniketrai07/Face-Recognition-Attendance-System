{% extends "base.html" %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-6">
    <div class="glass-card p-3">
      <h5 class="fw-bold mb-2">Live Attendance</h5>
      <video id="video" autoplay playsinline width="100%"></video>
      <canvas id="canvas" class="d-none"></canvas>
      <div class="d-flex gap-2 mt-3">
        <button id="start" class="btn btn-success">Start</button>
        <button id="stop" class="btn btn-warning">Stop</button>
        <a class="btn btn-outline-light" href="/export/today">Export Today Excel</a>
      </div>
      <div id="status" class="mt-2 small text-light opacity-75"></div>

      <form class="mt-3 d-flex gap-2" method="POST" action="/export/range">
        <input class="form-control" type="date" name="from_date" required>
        <input class="form-control" type="date" name="to_date" required>
        <button class="btn btn-primary" type="submit">Export Range</button>
      </form>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="glass-card p-4">
      <h5 class="fw-bold">Latest Records</h5>
      <div class="table-responsive mt-3">
        <table class="table table-dark table-hover align-middle">
          <thead>
            <tr>
              <th>Reg</th><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th>
            </tr>
          </thead>
          <tbody id="rows">
            {% for r in rows %}
            <tr>
              <td>{{r.Reg_No}}</td><td>{{r.Name}}</td><td>{{r.Date}}</td>
              <td>{{r.In_Time}}</td><td>{{r.Out_Time}}</td><td>{{r.Attendance}}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <div class="small text-light opacity-75">Auto-updates while running.</div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='attendance.js') }}"></script>
{% endblock %}
